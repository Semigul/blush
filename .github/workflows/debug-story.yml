name: Debug – Testa story:expand

on:
  issues:
    types: [labeled]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Kontrollera label-namn
        run: |
          echo "Label som lades till: ${{ github.event.label.name }}"
          echo "Är det story:expand? ${{ github.event.label.name == 'story:expand' }}"
      
      - name: Kör bara om story:expand
        if: github.event.label.name == 'story:expand'
        run: echo "✅ Story Architect borde ha körts!"
      
      - name: Kör om någon annan label
        if: github.event.label.name != 'story:expand'
        run: echo "ℹ️ Du lade till label: ${{ github.event.label.name }}"
