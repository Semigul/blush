name: Auto Implement

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    if: github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and commit implementation
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueNum = issue.number;
            const title = issue.title.toLowerCase();
            const body = issue.body || '';
            
            function getIssueType() {
              if (title.includes('ta bort') || title.includes('radera')) return 'cleanup';
              if (title.includes('fixa') || title.includes('bug')) return 'bugfix';
              if (title.includes('refactor')) return 'refactor';
              return 'feature';
            }
            
            const issueType = getIssueType();
            const guideSummary = {
              cleanup: 'Fokus: Identifiera och ta bort överflödig kod/innehål enligt acceptance-criteria.',
              bugfix: 'Fokus: Åtgärda buggen enligt acceptance-kriterier.',
              feature: 'Fokus: Implementera ny funktionalitet.',
              refactor: 'Fokus: Refaktorera relevant kod utan att ändra funktionalitet.'
            };
            
            const msg = 'Implementeringsguide för Issue #' + issueNum + '\n\n' +
              '**Type:** ' + issueType.toUpperCase() + '\n\n' +
              guideSummary[issueType] + '\n\n' +
              'Story från issue:\n' + body + '\n\n' +
              'Git-instruktioner:\n' +
              'git switch -c implement/issue-' + issueNum + '\n' +
              '# Gör dina ändringar\n' +
              'git add .\n' +
              'git commit -m "Implement issue #' + issueNum + '"\n' +
              'git push origin implement/issue-' + issueNum;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
              body: msg
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
              labels: ['awaiting-implementation']
            });
            
            console.log('Implementation guide posted for issue #' + issueNum);
