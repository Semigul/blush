name: Release – Blush & Bluff

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versionsnummer, till exempel 1.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check app.js
  release:
    needs: verify
    # Lägg till en required reviewer i GitHub Settings → Environments → production.
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Skapa versionstaggen och GitHub-releasen
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "v$VERSION" --target main --generate-notes --title "Blush & Bluff v$VERSION"
