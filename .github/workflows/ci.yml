name: Kontrollera ändringar

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Kontrollera JavaScript
        run: node --check app.js
      - name: Kontrollera manifestet
        run: node --input-type=module -e "JSON.parse(await (await import('node:fs/promises')).readFile('manifest.webmanifest', 'utf8')); console.log('Manifestet är giltigt JSON.')"
      - name: Kontrollera rollbilder
        run: |
          test -f assets/roles/smudge-wolf.png
          test -f assets/roles/shade-reader.png
          test -f assets/roles/topcoat-guardian.png
          test -f assets/roles/precision-liner.png
