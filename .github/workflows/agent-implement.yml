name: Agent – förbereda implementering

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  prepare-implement:
    # Triggeras när agent:ready-label läggs till
    if: github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
      - name: Skapa implementerings-instruktion
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const instruction = `# 🛠️ Implementeringsagent – Din instruktion

**Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}**

## Din uppgift
Använd GitHub Copilot i VS Code för att implementera denna godkända story i koden.

## Godkänd story
\`\`\`
${{ github.event.issue.body || 'Ingen story-detaljer' }}
\`\`\`

## Använd denna prompt med Copilot:
\`\`\`
Implementera denna godkända story i Blush & Bluff-projektet.

Story:
${{ github.event.issue.body || 'Ingen story-detaljer' }}

Regler:
- Implementera BARA vad som står i storyn
- Ändra INTE GitHub Actions, hemligheter, Firebase-regler eller publiceringsinställningar
- Kör relevanta kontroller innan du är klar (t.ex. \`node --check app.js\`)
- Skapa INGEN release eller push själv
- Bara applikationskod

Beskriv dina ändringar och vilka filer du uppdaterade.
\`\`\`

## Nästa steg
1. Kopiera prompten ovan
2. Öppna Copilot Chat i VS Code (Cmd+I)
3. Klistra in prompten och kör den
4. Implementera ändringarna enligt Copiots förslag
5. Kör \`node --check app.js\` för att validera
6. Skapa en ny branch: \`git switch -c implement/issue-${{ github.event.issue.number }}\`
7. Committa ändringar: \`git add -A && git commit -m "Implementera story #${{ github.event.issue.number }}"\`
8. Pusha branchen: \`git push origin implement/issue-${{ github.event.issue.number }}\`
9. Skapa PR på GitHub med länk tillbaka till Issue #${{ github.event.issue.number }}

GitHub Actions körs automatiskt efter att du pushar:
- CI-tester validerar koden
- Review-agent granskar ändringarna
- Du granskar och slår ihop PR:n när allt ser bra ut
`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: instruction,
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['awaiting-implementation'],
            });
            
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              name: 'agent:ready',
            });
