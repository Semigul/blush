name: Agent – implementera story

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    # Kör endast när repoägaren uttryckligen aktiverar en story.
    if: github.event.label.name == 'agent:ready' && github.actor == 'Semigul' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: true
      - name: Skriv en säker arbetsbrief till agenten
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const fs = require('fs');
            const brief = `# Godkänd GitHub-story\n\nIssue #${process.env.ISSUE_NUMBER}: ${process.env.ISSUE_TITLE}\n\n${process.env.ISSUE_BODY || ''}\n\n## Agentregler\n- Implementera bara vad som står i storyn.\n- Ändra aldrig GitHub Actions, hemligheter, Firebase-regler eller publiceringsinställningar.\n- Kör relevanta kontroller innan du är klar.\n- Skapa ingen release och pusha inte själv.\n`;
            fs.writeFileSync('agent-task.md', brief);
      - name: Låt Codex implementera ändringen
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          allow-users: Semigul
          permission-profile: ':workspace'
          prompt: |
            Läs agent-task.md. Implementera den godkända storyn i arbetsytan.
            Arbeta bara i applikationskoden. Gör inga commits, inga pushes och ändra inte .github.
      - name: Skapa en pull request
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if test -n "$(git status --porcelain .github)"; then
            gh issue comment "$ISSUE_NUMBER" --body "⚠️ Agenten försökte ändra GitHub-konfiguration. Ingen PR skapades."
            exit 1
          fi
          if test -z "$(git status --porcelain)"; then
            gh issue comment "$ISSUE_NUMBER" --body "🤖 Agenten hittade ingen ändring att göra. Storyn behöver förtydligas."
            exit 0
          fi
          branch="agent/issue-$ISSUE_NUMBER-$RUN_ID"
          git switch -c "$branch"
          git config user.name "blush-agent[bot]"
          git config user.email "blush-agent[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Implementera story #$ISSUE_NUMBER"
          git push origin "$branch"
          gh pr create --base main --head "$branch" --title "Agent: story #$ISSUE_NUMBER" --body "Closes #$ISSUE_NUMBER\n\nAutomatiskt skapad pull request. CI och agentgranskning måste vara klara innan manuell merge."
