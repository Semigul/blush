name: Story Architect – förbereda one-liner

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  prepare-story:
    # Triggeras när story:expand-label läggs till
    if: github.event.label.name == 'story:expand'
    runs-on: ubuntu-latest
    steps:
      - name: Skapa story-instruktion för GitHub Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const instruction = `# Story Architect - Din instruktion

**Issue #${issue.number}: ${issue.title}**

## Din uppgift
Använd GitHub Copilot i VS Code för att skapa ett komplett story-utkast baserat på denna one-liner.

## Använd denna prompt med Copilot:
\`\`\`
Läs denna one-liner och skapa ett tydligt story-förslag på svenska för Blush & Bluff.
Svara ENDAST i följande Markdown-struktur:

## Mål
## Bakgrund
## Omfattning
## Utanför omfattning
## Acceptanskriterier
## Testplan
## Risker
## Öppna frågor

One-liner:
${issue.title}

Detaljer:
${issue.body || 'Ingen ytterligare info'}

Hitta inte på produktkrav. Om information saknas, skriv en fråga under Öppna frågor.
\`\`\`

## Nästa steg
1. Kopiera prompten ovan
2. Öppna Copilot Chat i VS Code (Cmd+I)
3. Klistra in prompten och kör den
4. Kopiera resultatet
5. Gå tillbaka till Issue #${issue.number} och uppdatera Issue-body med story-utkastet
6. Lägg etikett \`story\` när du är nöjd
`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: instruction,
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['awaiting-story-draft'],
            });
            
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              name: 'story:expand',
            });
