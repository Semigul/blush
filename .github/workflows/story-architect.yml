name: Story Architect – förbereda one-liner

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  prepare-story:
    # Bara repoägaren kan starta Story Architect.
    if: github.event.label.name == 'story:expand' && github.actor == 'Semigul' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Skapa story-instruktion för GitHub Copilot
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const instruction = `# 📋 Story Architect – Din instruktion

**Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}**

## Din uppgift
Använd GitHub Copilot i VS Code för att skapa ett komplett story-utkast baserat på denna one-liner.

## Använd denna prompt med Copilot:
\`\`\`
Läs denna one-liner och skapa ett tydligt story-förslag på svenska för Blush & Bluff.
Svara ENDAST i följande Markdown-struktur:

## Mål
## Bakgrund
## Omfattning
## Utanför omfattning
## Acceptanskriterier
## Testplan
## Risker
## Öppna frågor

One-liner:
${{ github.event.issue.title }}

Detaljer:
${{ github.event.issue.body || 'Ingen ytterligare info' }}

Hitta inte på produktkrav. Om information saknas, skriv en fråga under Öppna frågor.
\`\`\`

## Nästa steg
1. Kopiera prompten ovan
2. Öppna Copilot Chat i VS Code (Cmd+I)
3. Klistra in prompten och kör den
4. Kopiera resultatet
5. Gå tillbaka till Issue #${{ github.event.issue.number }} och uppdatera Issue-body med story-utkastet
6. Lägg etikett \`story\` när du är nöjd
`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: instruction,
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['awaiting-story-draft'],
            });
            
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              name: 'story:expand',
            });
