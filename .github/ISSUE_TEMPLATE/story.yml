name: Story
description: Beskriv en förbättring som en agent kan förbereda i en pull request.
title: "Story: "
labels: ["story", "needs-refinement"]
body:
  - type: markdown
    attributes:
      value: |
        En agent börjar aldrig arbeta förrän du har kontrollerat denna story och satt etiketten `agent:ready`.
  - type: textarea
    id: goal
    attributes:
      label: Mål
      description: Vad ska användaren kunna göra när storyn är klar?
      placeholder: Som arrangör vill jag ... så att ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptanskriterier
      description: Skriv tydliga punkter som går att kontrollera.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Avgränsningar och designnoteringar
      description: Vad får inte ändras? Finns det bilder, texter eller länkar att använda?
  - type: dropdown
    id: risk
    attributes:
      label: Risknivå
      options:
        - Låg – text, stil eller liten UI-ändring
        - Medel – spelregler eller klientlogik
        - Hög – Firebase, länkar, säkerhet eller publicering
    validations:
      required: true
