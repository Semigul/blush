<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff4f9a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Blush & Bluff" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Blush & Bluff — ett socialt spel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .round-label { font: 500 10px "DM Mono", monospace; letter-spacing: .08em; color: #f1c97d; background: #3c2415; padding: 6px 8px; border: 1px solid #76502b; border-radius: 8px; }
      .new-round { position: fixed; top: 20px; right: 22px; z-index: 2; border: 1px solid #76502b; border-radius: 12px; padding: 10px 13px; background: #2a1a11; color: #f7d48d; box-shadow: 0 8px 24px rgba(0,0,0,.28); font: 800 13px Nunito, sans-serif; cursor: pointer; }
      .new-round:hover { background: #543118; }
      .reset-game { position: fixed; top: 66px; right: 22px; z-index: 2; border: 1px solid #76502b; border-radius: 12px; padding: 10px 13px; background: #3a2017; color: #f0c47d; box-shadow: 0 8px 24px rgba(0,0,0,.28); font: 800 13px Nunito, sans-serif; cursor: pointer; }
      .reset-game:hover { background: #65351f; }
      @media (max-width: 520px) { .new-round { top: 14px; right: 16px; } .reset-game { top: 60px; right: 16px; } }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <button class="new-round" id="new-round" type="button">↻ Ny runda</button>
    <button class="reset-game" id="reset-game-global" type="button">Starta om spelet</button>
    <script type="module" src="app.js"></script>
  </body>
</html>
